server {
    # Listen for HTTP traffic inside the Docker network.
    listen 80;

    # Accept requests for any hostname because Cloudflare Tunnel handles the public hostname.
    server_name mangablade.online;

    # Serve the compiled Vite/React static files copied into the Nginx image.
    root /usr/share/nginx/html;
    index index.html;

    # Proxy backend API requests to the Spring Boot service in docker-compose.
    location /api/ {
        proxy_pass http://spring-boot:8080/api/;
        proxy_http_version 1.1;

        # Preserve useful request metadata for Spring Boot logs/security.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Let React Router handle client-side routes such as /admin/users.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
