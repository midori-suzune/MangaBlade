spring:
  config:
    import:
      - "optional:file:.env[.properties]"
      - "optional:file:../.env[.properties]"

  application:
    name: mangablade-backend

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/MangaBlade?createDatabaseIfNotExist=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  app:
    otruyen:
      manga-import-cron: "0 */4 * * * *"
      chapter-page-import-cron: "0 */6 * * * *"
      importer:
        max-manga-per-run: 2

jwt:
  secret-key: ${JWT_SECRET_KEY}
  expiration-ms: 3600000

logging:
  charset:
    console: UTF-8
    file: UTF-8
  pattern:
    console: "[%d{yyyy-MM-dd HH:mm:ss}] %clr(%-5level) %blue(%-40.40logger{39}) : %msg%n"
    file: "[%d{yyyy-MM-dd HH:mm:ss}] %-5level %-40.40logger{39} : %msg%n"
  level:
    com.mangablade.backend: debug
    root: info
