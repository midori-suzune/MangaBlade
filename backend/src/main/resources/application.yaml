spring:
  application:
    name: mangablade-backend

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/mangablade?createDatabaseIfNotExist=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
