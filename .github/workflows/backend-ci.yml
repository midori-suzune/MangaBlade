name: Backend CI

on:
  push:
    branches:
      - master
    paths:
      - backend/**
      - .github/workflows/backend-ci.yml
  pull_request:
    branches:
      - master
      - dev
    paths:
      - backend/**
      - .github/workflows/backend-ci.yml

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: mangablade
          MYSQL_USER: mangablade
          MYSQL_PASSWORD: ci_password
          MYSQL_ROOT_PASSWORD: ci_root_password
        ports:
          - 3306:3306
        # Wait until MySQL accepts connections before running backend tests.
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pci_root_password --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=30s
    env:
      DB_URL: jdbc:mysql://127.0.0.1:3306/mangablade?serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
      DB_USERNAME: mangablade
      DB_PASSWORD: ci_password
      JWT_SECRET_KEY: 01234567890123456789012345678901
      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
          cache-dependency-path: backend/pom.xml
      - run: ./mvnw --batch-mode verify
